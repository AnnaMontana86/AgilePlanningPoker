# fly.toml app configuration file generated for simple-agile-planningpoker on 2026-03-15T23:54:27+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'simple-agile-planningpoker'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  ALLOWED_ORIGINS = 'https://simple-agile-planningpoker.fly.dev'
  EXPIRY_CHECK_INTERVAL_SECONDS = '60'
  ROOM_TTL_HOURS = '3'

[deploy]
  strategy = 'immediate'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  max_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 500
    soft_limit = 400

[[vm]]
  cpu_kind = 'shared'
  size = 'shared-cpu-1x'
  memory_mb = 256
