# fly.toml — AgilePlanningPoker
# Deploy: fly deploy

app = 'agileplanningpoker-delicate-night-3841'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile"

[env]
  ROOM_TTL_HOURS = "3"
  EXPIRY_CHECK_INTERVAL_SECONDS = "60"
  ALLOWED_ORIGINS = "https://agileplanningpoker-delicate-night-3841.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
